name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - claude/fervent-bardeen-FXkEc
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/invoice-billing.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-billing-apk
          path: dist/invoice-billing.apk
          if-no-files-found: error

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Invoice Billing - Latest APK
          body: |
            Latest release build of the Invoice Billing Android app.
            Built automatically from `${{ github.sha }}`.

            Download `invoice-billing.apk` below and install it on your Android device
            (enable "Install from unknown sources" if prompted).
          files: dist/invoice-billing.apk
          fail_on_unmatched_files: true
